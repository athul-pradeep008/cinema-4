apiVersion: apps/v1
kind: Deployment
metadata:
  name: cinema-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cinema-backend
  template:
    metadata:
      labels:
        app: cinema-backend
    spec:
      containers:
      - name: backend
        image: cinema-backend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: cinema-backend-service
spec:
  selector:
    app: cinema-backend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 5000
  type: ClusterIP
